name: CI/CD

# Trigger on every push and pull request targeting main.
# Required status checks ("test") are enforced via GitHub branch protection rules,
# blocking merges until the gate passes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/af2b/sum-service

jobs:
  # ── Gate: unit + integration tests ─────────────────────────────────────────
  # This job is the required status check. No merge and no Docker build
  # proceeds unless every test passes.
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key:          ${{ runner.os }}-m2-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache Clojure git deps
        uses: actions/cache@v4
        with:
          path: ~/.gitlibs
          key:          ${{ runner.os }}-gitlibs-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-gitlibs-

      - name: Run tests
        run: make test

  # ── Build & Push Docker image ───────────────────────────────────────────────
  # Runs only on direct pushes to main (not on PRs) and only after the test
  # gate passes. Produces three tags:
  #   ghcr.io/af2b/sum-service:<short-sha>  — immutable, points to this exact commit
  #   ghcr.io/af2b/sum-service:<semver-tag> — present only when a git tag is pushed
  #   ghcr.io/af2b/sum-service:latest       — mutable, always the most recent build
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key:          ${{ runner.os }}-m2-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache Clojure git deps
        uses: actions/cache@v4
        with:
          path: ~/.gitlibs
          key:          ${{ runner.os }}-gitlibs-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-gitlibs-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
